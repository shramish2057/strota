version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      types:
        patterns:
          - '@types/*'
  - package-ecosystem: pip
    directory: /apps/api-python
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
  - package-ecosystem: docker
    directory: /apps/api-python
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Berlin
