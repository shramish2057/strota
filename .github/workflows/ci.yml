name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.11

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api-python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv==0.4.27

      - name: Create venv and install
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: |
          source .venv/bin/activate
          ruff check src tests

      - name: Mypy (strict)
        run: |
          source .venv/bin/activate
          mypy src

      - name: Pytest
        env:
          HMAC_SECRET: ${{ secrets.CI_HMAC_SECRET_DUMMY || 'x_for_ci_only_x_for_ci_only_xxxx' }}
          ENVIRONMENT: testing
        run: |
          source .venv/bin/activate
          pytest

  integration:
    name: Integration (HMAC round-trip TS <-> Python)
    needs: [node, python]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.11

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node deps and build shared
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --filter @strota/shared build

      - name: Install Python uv and api deps
        run: |
          pip install uv==0.4.27
          cd apps/api-python
          uv venv
          source .venv/bin/activate
          uv pip install -e .

      - name: Run cross-language round-trip
        run: node tests/integration/hmac_round_trip.mjs

  db:
    name: DB (Postgres 17 migration smoke + RLS isolation)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: strota_dev
          POSTGRES_DB: strota
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d strota"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: strota_dev
      PGHOST: 127.0.0.1
      PGPORT: 55432
      PGUSER: postgres
      PGDATABASE: strota
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply all migrations
        run: |
          set -euo pipefail
          for f in 001_initial_schema 002_rls_policies 003_triggers_lifecycle 004_seed 005_self_hosted_auth; do
            echo "::group::Applying $f"
            psql -v ON_ERROR_STOP=1 -f db/migrations/$f.sql
            echo "::endgroup::"
          done

      - name: Verify seed counts
        run: |
          psql -v ON_ERROR_STOP=1 -At -c "
            SELECT 'orgs=' || count(*) FROM organizations;
            SELECT 'users=' || count(*) FROM users;
            SELECT 'projects=' || count(*) FROM projects;
            SELECT 'bauherren=' || count(*) FROM bauherren;
            SELECT 'required_documents=' || count(*) FROM required_documents;
          " | tee /tmp/counts.txt
          grep -q '^orgs=2$' /tmp/counts.txt
          grep -q '^users=3$' /tmp/counts.txt
          grep -q '^projects=5$' /tmp/counts.txt
          grep -q '^bauherren=5$' /tmp/counts.txt
          grep -q '^required_documents=12$' /tmp/counts.txt

      - name: Audit-chain insert + verify
        run: |
          psql -v ON_ERROR_STOP=1 -At <<'SQL'
            INSERT INTO audit_log (org_id, user_id, action, metadata) VALUES
              ('aaaaaaaa-0000-0000-0000-000000000001',
               '11111111-1111-1111-1111-111111111111',
               'ci.smoke', '{"k":1}'::jsonb),
              ('aaaaaaaa-0000-0000-0000-000000000001',
               '11111111-1111-1111-1111-111111111111',
               'ci.smoke', '{"k":2}'::jsonb);
            SELECT count(*) || ' audit rows' FROM audit_log;
            SELECT COALESCE(verify_audit_chain()::text, 'intact') AS chain_status;
          SQL
          # verify_audit_chain returns NULL when intact; we assert via psql exit on broken row.
          BROKEN=$(psql -v ON_ERROR_STOP=1 -At -c "SELECT verify_audit_chain()")
          if [ -n "$BROKEN" ]; then
            echo "::error::audit chain broken at sequence_no=$BROKEN"
            exit 1
          fi
          echo "audit chain intact"

      - name: RLS isolation smoke (two orgs see only own projects)
        run: |
          psql -v ON_ERROR_STOP=1 -At <<'SQL' > /tmp/rls.txt
            CREATE ROLE strota_ci_authenticated NOLOGIN;
            GRANT USAGE ON SCHEMA public, auth TO strota_ci_authenticated;
            GRANT SELECT ON auth.users TO strota_ci_authenticated;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO strota_ci_authenticated;

            -- user 11111... belongs to org-1 (3 projects)
            SELECT set_config('request.jwt.claim.sub', '11111111-1111-1111-1111-111111111111', false);
            SET ROLE strota_ci_authenticated;
            SELECT 'user1_projects=' || count(*) FROM projects;
            RESET ROLE;

            -- user 33333... belongs to org-2 (2 projects)
            SELECT set_config('request.jwt.claim.sub', '33333333-3333-3333-3333-333333333333', false);
            SET ROLE strota_ci_authenticated;
            SELECT 'user3_projects=' || count(*) FROM projects;
            RESET ROLE;

            -- unknown jwt sub -> 0 visible
            SELECT set_config('request.jwt.claim.sub', '00000000-0000-0000-0000-000000000099', false);
            SET ROLE strota_ci_authenticated;
            SELECT 'unknown_projects=' || count(*) FROM projects;
            RESET ROLE;

            REASSIGN OWNED BY strota_ci_authenticated TO postgres;
            DROP OWNED BY strota_ci_authenticated;
            DROP ROLE strota_ci_authenticated;
          SQL
          cat /tmp/rls.txt
          grep -q '^user1_projects=3$' /tmp/rls.txt
          grep -q '^user3_projects=2$' /tmp/rls.txt
          grep -q '^unknown_projects=0$' /tmp/rls.txt

      - name: Rollback chain (down migrations)
        run: |
          set -euo pipefail
          for f in 005_self_hosted_auth 004_seed 003_triggers_lifecycle 002_rls_policies 001_initial_schema; do
            echo "::group::Rolling back $f"
            psql -v ON_ERROR_STOP=1 -f db/migrations/$f.down.sql
            echo "::endgroup::"
          done

  punctuation-guard:
    name: Punctuation guard (no em-dash in source / docs)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Check for em-dash in tracked files
        run: |
          set -euo pipefail
          # Build the pattern from hex bytes so this workflow file itself
          # contains zero literal em-dash characters (the guard would catch itself).
          PATTERN=$(printf '\xe2\x80\x94')
          if grep -RIn --binary-files=without-match "$PATTERN" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.next \
            --exclude-dir=dist \
            --exclude-dir=.turbo \
            --exclude-dir=.venv \
            --exclude='pnpm-lock.yaml' \
            --exclude='*.lock' \
            --exclude='*.svg' \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.pdf' \
            .; then
            echo "::error::Em-dash detected. Use single dash, comma, or colon instead."
            exit 1
          fi
          echo "Punctuation guard passed."
