# Supabase project config for local development and CI.
# Production Supabase project is configured separately via the dashboard.
# See https://supabase.com/docs/guides/local-development/cli/config

project_id = "strota-dev"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "500MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/api/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
template = "supabase/templates"

[auth.email.smtp]
admin_email = "noreply@dev.strota.de"
sender_name = "Strota Dev"

[auth.sms]
enable_signup = false
enable_confirmations = false

[functions]
verify_jwt = false

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = ""
s3_region = ""
s3_bucket = ""
